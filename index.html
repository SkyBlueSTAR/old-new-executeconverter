<head>
    <meta charset="UTF-8">
    <title>execute comverter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>execute converter made by SkyBlueのSTAR</h1>
    <p>
        テキストボックスに古い構文のexecuteを含んだコマンドを書いて「変換」のボタンを押すと、executeを新しい構文に置き換えたコマンドがボタンの下に生成されます。<br>
    </p>
    <p>変換前構文：<br>
        <textarea name="exchangeText" rows="25" id="exchangeText"></textarea>
    </p>
    <div>
        <input type="button" value="変換" id="exchangeButton">
    </div>
    <p id="msg"></p>

    <script>
        function buttonClick(){
          let temp = reviewTextarea.value.replace(/execute\s*("\S.*\S"|\S*|@(?:[parse]|initiator)\s*(?:\[.*?\])?)((?:\s*~-?\d*(?:\.\d+)?|\s+-?\d+(?:\.\d+)?){3}|(?:\s*\^-?\d*(?:\.\d+)?){3})\s*/g,'execute as $1 at @s positioned$2 run ');
          temp = temp.replace(/run detect((?:\s*~-?\d*(?:\.\d+)?|\s+-?\d+(?:\.\d+)?){3}|(?:\s*\^-?\d*(?:\.\d+)?){3})\s*(\S+)\s+(-?\d+)\s+/g, 'if block $1 $2 $3 run ');
          temp = temp.replace(/positioned\s*~\s*~\s*~\s/g, '');
          temp = temp.replace(/run\sexecute\s/g, '');
          temp = temp.replace(/as\s@s\sat\s@s\s/g, '');
          temp = temp.replace(/execute\srun\s/g, '');
          msg.innerText = temp;
        }
        
        let reviewTextarea = document.getElementById('exchangeText');
        let msg = document.getElementById('msg');
        
        let exchangeButton = document.getElementById('exchangeButton');
        exchangeButton.addEventListener('click', buttonClick);
        </script>
</body>
